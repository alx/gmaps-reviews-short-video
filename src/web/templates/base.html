<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}ReviewReel{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
  <script src="{{ url_for('static', filename='js/htmx.min.js') }}"></script>
  <script src="{{ url_for('static', filename='js/sortable.min.js') }}"></script>
</head>
<body>
  <header>
    <h1>ReviewReel</h1>
    <ul class="steps">
      <li class="{{ 'active' if active_step == 1 else ('done' if active_step and active_step > 1 else '') }}">1 Paste URL</li>
      <li class="{{ 'active' if active_step == 2 else ('done' if active_step and active_step > 2 else '') }}">2 Select &amp; Arrange</li>
      <li class="{{ 'active' if active_step == 3 else '' }}">3 Publish</li>
    </ul>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  <script>
  // Auto-scroll to newly appended wizard blocks
  document.body.addEventListener('htmx:afterSwap', function(evt) {
    const target = evt.detail.target;
    if (!target) return;
    let el = null;
    if (target.id === 'wizard-blocks') {
      el = target.lastElementChild;
    } else if (target.closest && target.closest('#wizard-blocks')) {
      el = target;
    }
    if (el) setTimeout(function() { el.scrollIntoView({behavior: 'smooth', block: 'start'}); }, 80);
  });
  </script>
</body>
</html>
