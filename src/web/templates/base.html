<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}ReviewReel{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
  <script src="{{ url_for('static', filename='js/htmx.min.js') }}"></script>
  <script src="{{ url_for('static', filename='js/sortable.min.js') }}"></script>
</head>
<body>
  <main>
    {% block content %}{% endblock %}
  </main>
  <script>
  document.body.addEventListener('htmx:afterSwap', function(evt) {
    var target = evt.detail.target;
    if (!target) return;

    // Auto-scroll when a step area is updated with new content.
    var stepAreas = ['step2-area', 'step3-area', 'step4-area'];
    if (stepAreas.indexOf(target.id) >= 0) {
      setTimeout(function() {
        target.scrollIntoView({behavior: 'smooth', block: 'start'});
      }, 120);
    }

    // Re-enable the Generate button once video generation finishes (step3-area gets new content).
    if (target.id === 'step3-area') {
      var btn = document.getElementById('generate-btn');
      if (btn) btn.disabled = false;
    }
  });
  </script>
</body>
</html>
