<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}ReviewReel{% endblock %}</title>

  <!-- OpenGraph -->
  <meta property="og:type"        content="website">
  <meta property="og:site_name"   content="ReviewReel">
  <meta property="og:title"       content="{% block og_title %}ReviewReel – Generate Short Videos from Google Maps{% endblock %}">
  <meta property="og:description" content="{% block og_description %}Turn any Google Maps business into a polished short video — ready to publish on YouTube Shorts, Instagram Reels, or TikTok in minutes.{% endblock %}">
  <meta property="og:image"       content="{% block og_image %}https://reviewreel.alexgirard.com/static/img/og-preview.png{% endblock %}">
  <meta property="og:url"         content="{% block og_url %}https://reviewreel.alexgirard.com/{% endblock %}">

  <!-- Twitter Card -->
  <meta name="twitter:card"        content="summary_large_image">
  <meta name="twitter:title"       content="{{ self.og_title() }}">
  <meta name="twitter:description" content="{{ self.og_description() }}">
  <meta name="twitter:image"       content="{{ self.og_image() }}">

  <!-- Canonical / description -->
  <meta name="description" content="{{ self.og_description() }}">
  <link rel="canonical" href="{{ self.og_url() }}">

  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
  <script src="{{ url_for('static', filename='js/htmx.min.js') }}"></script>
  <script src="{{ url_for('static', filename='js/sortable.min.js') }}"></script>

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-RNRWTR02LF"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-RNRWTR02LF');
  </script>
</head>
<body>
  <main>
    {% block content %}{% endblock %}
  </main>
  <script>
  document.body.addEventListener('htmx:afterSwap', function(evt) {
    var target = evt.detail.target;
    if (!target) return;

    // Auto-scroll when a step area is updated with new content,
    // but skip while video generation is polling (avoids repeated scroll during progress).
    var stepAreas = ['step2-area', 'step3-area'];
    if (stepAreas.indexOf(target.id) >= 0 && !target.querySelector('#loading-generate')) {
      setTimeout(function() {
        target.scrollIntoView({behavior: 'smooth', block: 'start'});
      }, 120);
    }

    // Re-enable the Generate button once video generation finishes (step3-area gets new content).
    if (target.id === 'step3-area') {
      var btn = document.getElementById('generate-btn');
      if (btn) btn.disabled = false;
    }

    // Fire GA4 events as the user progresses through wizard steps.
    var gaStepMap = {'step2-area': 'step1_complete', 'step3-area': 'video_generated'};
    var gaEvent = gaStepMap[target.id];
    if (gaEvent) gtag('event', gaEvent);
  });

  document.body.addEventListener('htmx:beforeRequest', function(evt) {
    var elt = evt.detail.elt;
    if (elt && elt.getAttribute && elt.getAttribute('hx-post') === '/step1/submit') {
      gtag('event', 'fetch_place_data');
    }
  });
  </script>
</body>
</html>
