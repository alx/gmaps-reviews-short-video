<div id="publish-area"
     hx-get="/tasks/{{ task_id }}/poll/publish"
     hx-trigger="load, every 1.5s"
     hx-swap="outerHTML"
     hx-target="this">
  <div class="progress-wrap">
    <div class="progress-bar-outer">
      <div class="progress-bar-inner" style="width: {{ pct }}%"></div>
    </div>
    <p class="progress-label">{{ progress }}</p>
  </div>
</div>
