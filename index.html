<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ReviewReel — Google Maps reviews to short-form video</title>
  <meta name="description" content="Generate 7-second portrait MP4s from any Google Maps business URL. Ken Burns slideshow, star ratings, top reviews — ready for Instagram Reels, TikTok, or YouTube Shorts." />

  <!-- Google Analytics 4 -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-RNRWTR02LF"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-RNRWTR02LF');
  </script>

  <!-- Inter font -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --section-alt: #f9fafb;
      --border: #e5e7eb;
      --radius: 8px;
      --max-w: 720px;
    }

    body {
      font-family: Inter, system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      font-size: 1rem;
    }

    .container {
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 0 1.5rem;
    }

    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    .btn {
      display: inline-block;
      background: var(--accent);
      color: #fff;
      padding: 0.75rem 1.75rem;
      border-radius: var(--radius);
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      border: none;
      transition: background 0.15s;
      text-decoration: none;
    }
    .btn:hover { background: var(--accent-hover); text-decoration: none; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }

    html { scroll-behavior: smooth; }
  </style>
</head>
<body>

  <main>
    <!-- Hero -->
    <section style="padding: 5rem 0 3.5rem;">
      <div class="container" style="text-align: center;">
        <h1 style="font-size: 2.25rem; font-weight: 700; line-height: 1.2; margin-bottom: 1.25rem;">
          Turn Google Maps reviews into<br />short-form videos — automatically
        </h1>
        <p style="font-size: 1.125rem; color: var(--muted); max-width: 560px; margin: 0 auto 2rem;">
          ReviewReel generates 7-second portrait MP4s from any Google Maps business URL:
          Ken Burns photo slideshow, star rating, top reviews, ready for Instagram Reels,
          TikTok, or YouTube Shorts.
        </p>
        <a href="#contact" class="btn">Request demo access ↓</a>
      </div>
    </section>

    <!-- sections go here -->
  </main>

  <footer>
    <!-- footer goes here -->
  </footer>

</body>
</html>
